<!doctype html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="description" content="TRENDY APPAREL MALL — 極簡街頭服飾電商" />
  <title>TRENDY APPAREL MALL — 極簡街頭服飾</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Archivo:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    /* TRENDY APPAREL MALL — 全站樣式 */
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
      letter-spacing: -0.01em;
      background: #FFFFFF;
      color: #0A0A0A;
    }

    .font-display {
      font-family: 'Archivo Black', sans-serif;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .font-mono {
      font-family: 'Space Mono', monospace;
    }

    ::selection {
      background: #0A0A0A;
      color: #fff;
    }

    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border-bottom: 1px solid rgba(10, 10, 10, 0.06);
    }

    .glass-dark {
      background: rgba(10, 10, 10, 0.55);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(10, 10, 10, 0.08);
    }

    .grain::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    .img-zoom {
      transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .group:hover .img-zoom {
      transform: scale(1.06);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #F5F5F4;
    }

    ::-webkit-scrollbar-thumb {
      background: #0A0A0A;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(0);
      }
    }

    @keyframes slideInUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    @keyframes heartBeat {
      0% {
        transform: scale(1)
      }

      25% {
        transform: scale(1.3)
      }

      50% {
        transform: scale(.95)
      }

      75% {
        transform: scale(1.15)
      }

      100% {
        transform: scale(1)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-8px)
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    .slide-in-right {
      animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .slide-in-up {
      animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .marquee-track {
      animation: marquee 40s linear infinite;
    }

    .heart-beat {
      animation: heartBeat 0.6s ease;
    }

    .fade-up {
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .bounce {
      animation: bounce 2s ease infinite;
    }

    .accent-red {
      color: #E11D48;
    }

    .bg-accent-red {
      background-color: #E11D48;
    }

    .accent-amber {
      color: #D97706;
    }

    .bg-accent-amber {
      background-color: #D97706;
    }

    button:active {
      transform: scale(0.97);
    }

    button {
      user-select: none;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible {
      outline: 2px solid #0A0A0A;
      outline-offset: 2px;
    }

    button:focus:not(:focus-visible) {
      outline: none;
    }

    @media (hover: none) {
      .group:hover .img-zoom {
        transform: scale(1);
      }
    }

    @media (max-width: 768px) {

      button,
      a {
        min-height: 44px;
      }
    }

    html {
      scroll-behavior: smooth;
    }

    .preorder-badge {
      background-color: #D97706;
      color: white;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .size-opt {
      height: 48px;
      min-width: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .size-opt.active {
      background: black;
      color: white;
      border-color: black;
    }

    .modal-scroll::-webkit-scrollbar {
      width: 4px;
    }
  </style>
</head>

<body>

        <button onclick="toggleSearch()"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
    </div>
  </header>

  <!-- ========== 主要內容 MAIN CONTENT ========== -->

      const disAmt = AppState.discount ? (AppState.discount.type === 'percent' ? Math.min(sub * (AppState.discount.value / 100), AppState.discount.max || Infinity) : AppState.discount.value) : 0;
      const ship = sub >= 2000 ? 0 : 150; const shipDis = (AppState.discount && AppState.discount.type === 'free_shipping') ? Math.min(ship, 150) : 0;
      AppState.orders.push({ id: 'O' + Date.now(), total: Math.max(0, sub - disAmt + ship - shipDis), items: [...AppState.cart], createdAt: new Date() });

    function closeInfoModal() { document.getElementById('info-modal').classList.add('hidden'); }

    document.addEventListener('DOMContentLoaded', () => {
      load(); updateUI(); renderPage();
      document.getElementById('search-input').addEventListener('keypress', e => { if (e.key === 'Enter') { AppState.searchQuery = e.target.value; AppState.currentPage = 'shop'; renderPage(); toggleSearch(); } });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          closeModal(); closeInfoModal(); closeRecommendModal();
          document.getElementById('cart-drawer').classList.add('hidden');
          document.getElementById('wishlist-drawer').classList.add('hidden');
          document.getElementById('auth-modal').classList.add('hidden');
          document.getElementById('search-bar').classList.add('hidden');
        }
      });
    });
  </script>
</body>

</html>
